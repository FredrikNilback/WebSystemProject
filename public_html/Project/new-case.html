<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <title>Incident Report</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/new-case.css">
</head>

<body>
    <header>
        <img src='images/company_logo.png' alt='company logo' id='company-logo'>
        <h1>NFV incident report portal</h1>
    </header>
    <div class="content">
        <main>
            <form action="submit_incident.php" method="post" enctype="multipart/form-data">

                <h2>Incident Report</h2>

                <div>
                    <label>Date and time of the incident</label>
                    <input type="datetime-local" name="incident_time">
                </div>

                <div>
                    <label>ID.nr</label>
                    <input type="text" name="id_nr">
                </div>

                <div>
                    <label>Describe incident</label>
                    <textarea name="description" class="text-box"></textarea>
                </div>

                <div>
                    <label>File attachments</label>
                    <input type="file" name="attachment">
                </div>
                <div>
                <label>Incident type</label>
                <select name="threats">
                    <option value="">-Select incident type-</option>
                    <option value="password-attack">Password Attack</option>
                    <option value="insider-threat">Insider Threat</option>
                </select>
                </div>

                <h2>Urgency Level</h2>

                <div class="urgency-selection">
                    <label class="custom-radio"> Critical
                        <input type="radio" name="urgency" value="critical">
                        <span class="checkmark"></span>
                    </label>
                    <label class="custom-radio"> High
                        <input type="radio" name="urgency" value="high">
                        <span class="checkmark"></span>
                    </label>
                    <label class="custom-radio"> Medium
                        <input type="radio" name="urgency" value="medium">
                        <span class="checkmark"></span>
                    </label>
                    <label class="custom-radio"> Low
                        <input type="radio" name="urgency" value="low">
                        <span class="checkmark"></span>
                    </label>
                </div>

                <button type="submit">Submit Report</button>

            </form>
        </main>
    </div>
</body>

</html>
